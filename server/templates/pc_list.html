{% extends "base.html" %}
{% block title %}PC一覧{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">PC 一覧</h2>
    <div class="page-actions">
        <input type="text" id="search-input" class="form-input" placeholder="PC名・IPで検索..." oninput="searchPCs()">
        <select id="status-filter" class="form-input" onchange="searchPCs()">
            <option value="">すべて</option>
            <option value="healthy">正常</option>
            <option value="warning">要注意</option>
            <option value="critical">危険</option>
            <option value="unknown">不明</option>
        </select>
        <select id="os-filter" class="form-input" onchange="searchPCs()">
            <option value="">OS: すべて</option>
            <option value="Windows 11">Windows 11</option>
            <option value="Windows 10">Windows 10</option>
            <option value="Windows Server">Windows Server</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="macOS">macOS</option>
        </select>
        <button class="btn btn-secondary" onclick="exportPCsCSV()">&#8595; CSV</button>
        <button id="bulk-task-btn" class="btn btn-primary role-operator-or-admin"
                onclick="openBulkModal()" style="display:none;">
            &#9654; 一括タスク実行 (<span id="bulk-count">0</span>台)
        </button>
    </div>
</div>

<div class="card">
    <table class="table" id="pc-table">
        <thead>
            <tr>
                <th style="width:40px;">
                    <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)"
                           title="全選択/全解除">
                </th>
                <th>PC名</th>
                <th>IPアドレス</th>
                <th>OS</th>
                <th>CPU</th>
                <th>メモリ</th>
                <th>ディスク空き</th>
                <th>状態</th>
                <th>スコア</th>
                <th>最終更新</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="pc-table-body">
            <tr><td colspan="11" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
</div>

<!-- 一括タスク実行モーダル -->
<div id="bulk-modal" class="modal-overlay">
    <div class="modal-container" style="max-width:480px;">
        <div class="modal-header">
            <h3 class="modal-title">一括タスク実行</h3>
            <button class="modal-close" onclick="closeBulkModal()">&#215;</button>
        </div>
        <div class="modal-body">
            <p id="bulk-target-info" style="margin-bottom:1rem;color:var(--text-secondary);"></p>
            <form id="bulk-form" onsubmit="submitBulkTask(); return false;">
                <div class="form-group">
                    <label>タスク種別 <span style="color:var(--danger);">*</span></label>
                    <select id="bulk-task-type" class="form-input" required>
                        <option value="">選択してください</option>
                        <option value="cleanup">cleanup（一時ファイル削除）</option>
                        <option value="update">update（Windows Update）</option>
                        <option value="diagnose">diagnose（診断）</option>
                        <option value="collect">collect（情報収集）</option>
                        <option value="custom">custom（カスタムコマンド）</option>
                    </select>
                </div>
                <div class="form-group" id="bulk-command-group" style="display:none;">
                    <label>コマンド</label>
                    <input type="text" id="bulk-command" class="form-input"
                           placeholder="実行するコマンドを入力" maxlength="512">
                </div>
                <div class="modal-footer" style="padding:0;margin-top:1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeBulkModal()">キャンセル</button>
                    <button type="submit" class="btn btn-primary" id="bulk-submit-btn">実行</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 一括実行結果モーダル -->
<div id="bulk-result-modal" class="modal-overlay">
    <div class="modal-container" style="max-width:480px;">
        <div class="modal-header">
            <h3 class="modal-title">実行結果</h3>
            <button class="modal-close" onclick="closeBulkResultModal()">&#215;</button>
        </div>
        <div class="modal-body" id="bulk-result-body"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeBulkResultModal()">閉じる</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pc_list.js"></script>
{% endblock %}
