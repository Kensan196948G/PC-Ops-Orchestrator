{% extends "base.html" %}
{% block title %}Agent管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">Agent 管理</h2>
    <p class="page-description">登録済み PowerShell Agent の一覧、API キー管理、バージョン管理。</p>
    <div class="d-flex-gap">
        <button class="btn btn-secondary" type="button" data-stub-alert="CSV エクスポート（次マイルストーン実装予定）">📊 一覧 CSV</button>
        <button class="btn btn-primary" type="button" data-stub-alert="一括バージョン更新（次マイルストーン実装予定）">🔄 一括バージョン更新</button>
    </div>
</div>

<div class="card">
    <h3 class="card-title">Agent 一覧 (CPU / メモリ / バージョン / 最終 heartbeat)</h3>
    <table class="table">
        <thead>
            <tr>
                <th>PC名</th>
                <th>OS</th>
                <th>CPU</th>
                <th>メモリ</th>
                <th>バージョン</th>
                <th>最終heartbeat</th>
                <th>状態</th>
            </tr>
        </thead>
        <tbody id="agents-body">
            <tr><td colspan="7" class="text-center">読み込み中…</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='js/agents.js') }}"></script>
{% endblock %}
