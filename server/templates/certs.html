{% extends "base.html" %}
{% block title %}証明書管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">証明書管理</h2>
    <p class="page-description">SSL/TLS・クライアント・コード署名証明書の有効期限を一元管理。</p>
    <button class="btn btn-primary role-admin-only" id="btn-add-cert">+ 証明書を登録</button>
</div>

<div class="card">
    <h3 class="card-title">🔒 証明書一覧</h3>
    <table class="table">
        <thead>
            <tr>
                <th>ドメイン / 名前</th>
                <th>発行者</th>
                <th>発行日</th>
                <th>有効期限</th>
                <th>残り日数</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="certs-body">
            <tr><td colspan="7" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<!-- Cert Modal -->
<div id="cert-modal" class="modal-overlay">
    <div class="modal-container modal-560">
        <div class="modal-header">
            <h3 class="modal-title" id="cert-modal-title">証明書を登録</h3>
            <button class="modal-close" id="btn-close-cert-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="cert-form">
                <div class="form-group">
                    <label class="form-label">名前（管理用）</label>
                    <input type="text" id="cert-name" class="form-input" placeholder="例: API サーバー証明書">
                </div>
                <div class="form-group">
                    <label class="form-label">ドメイン <span class="required">*</span></label>
                    <input type="text" id="cert-domain" class="form-input" placeholder="例: api.pc-ops.example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">発行者</label>
                    <input type="text" id="cert-issuer" class="form-input" placeholder="例: Let's Encrypt R3">
                </div>
                <div class="form-group">
                    <label class="form-label">種別</label>
                    <select id="cert-type" class="form-input">
                        <option value="server">サーバー証明書</option>
                        <option value="client">クライアント証明書</option>
                        <option value="code">コード署名</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">発行日</label>
                    <input type="date" id="cert-issued-at" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">有効期限 <span class="required">*</span></label>
                    <input type="date" id="cert-expires-at" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="cert-auto-renew" checked>
                        自動更新（ACME）
                    </label>
                </div>
                <div class="form-group">
                    <label class="form-label">メモ</label>
                    <textarea id="cert-notes" class="form-input" rows="2" placeholder="備考など"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-close-cert-modal-foot">キャンセル</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}" src="/static/js/certificates.js"></script>
{% endblock %}
