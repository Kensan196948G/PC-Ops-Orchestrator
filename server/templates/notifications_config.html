{% extends "base.html" %}
{% block title %}通知設定{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">通知設定</h2>
    <p class="page-description">Slack / Teams / Email / Webhook の通知チャネル管理。</p>
    <button class="btn btn-primary role-admin-only" id="btn-add-channel">+ チャネル追加</button>
</div>

<div class="card">
    <h3 class="card-title">📬 通知チャネル一覧</h3>
    <table class="table">
        <thead>
            <tr>
                <th>名前</th>
                <th>種別</th>
                <th>送信先</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="notif-channels-body">
            <tr><td colspan="5" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<!-- Channel Modal -->
<div id="channel-modal" class="modal-overlay">
    <div class="modal-container modal-560">
        <div class="modal-header">
            <h3 class="modal-title" id="channel-modal-title">チャネル追加</h3>
            <button class="modal-close" id="btn-close-channel-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="channel-form">
                <div class="form-group">
                    <label class="form-label">チャネル名 <span class="required">*</span></label>
                    <input type="text" id="channel-name" class="form-input" placeholder="例: #pc-ops-critical" required>
                </div>
                <div class="form-group">
                    <label class="form-label">種別 <span class="required">*</span></label>
                    <select id="channel-type" class="form-input">
                        <option value="slack">Slack</option>
                        <option value="teams">Microsoft Teams</option>
                        <option value="email">Email</option>
                        <option value="webhook">Webhook</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">送信先 (URL / メールアドレス) <span class="required">*</span></label>
                    <input type="text" id="channel-target" class="form-input" placeholder="https://hooks.slack.com/... または user@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="channel-active" checked>
                        有効にする
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-close-channel-modal-foot">キャンセル</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}" src="/static/js/notification_channels.js"></script>
{% endblock %}
