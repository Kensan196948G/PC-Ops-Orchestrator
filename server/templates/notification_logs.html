{% extends "base.html" %}
{% block title %}通知履歴{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">通知履歴</h2>
    <div class="page-actions">
        <select id="status-filter" class="form-input">
            <option value="">すべての状態</option>
            <option value="sent">送信済み</option>
            <option value="failed">失敗</option>
            <option value="skipped">スキップ</option>
        </select>
        <select id="channel-filter" class="form-input">
            <option value="">すべてのチャネル</option>
            <option value="slack">Slack</option>
            <option value="teams">Teams</option>
            <option value="email">Email</option>
            <option value="generic_webhook">Webhook</option>
        </select>
        <button class="btn btn-secondary" id="btn-refresh-logs">&#8635; 更新</button>
    </div>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>チャネル</th>
                <th>状態</th>
                <th>ルール</th>
                <th>メッセージ</th>
                <th>送信日時</th>
            </tr>
        </thead>
        <tbody id="notif-logs-body">
            <tr><td colspan="6" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="notif-logs-pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/notification_logs.js"></script>
{% endblock %}
