{% extends "base.html" %}
{% block title %}PCグループ管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">PCグループ管理</h2>
    <button class="btn btn-primary role-admin-only" id="btn-create-group">+ 新規グループ</button>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>グループ名</th>
                <th>説明</th>
                <th>PC 台数</th>
                <th>作成者</th>
                <th>作成日時</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="groups-body">
            <tr><td colspan="6" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="groups-pagination"></div>
</div>

<!-- Create/Edit Group Modal -->
<div id="group-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="group-modal-title">グループの作成</h3>
            <button class="modal-close" id="btn-close-group-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="group-form">
                <input type="hidden" id="group-id">
                <div class="form-group">
                    <label class="form-label">グループ名 <span class="required">*</span></label>
                    <input type="text" id="group-name" class="form-input" required placeholder="例: 総務部PC">
                </div>
                <div class="form-group">
                    <label class="form-label">説明</label>
                    <input type="text" id="group-description" class="form-input" placeholder="任意のメモ">
                </div>
                <div class="form-group">
                    <label class="form-label">所属 PC（PC名をカンマ区切りで入力）</label>
                    <input type="text" id="group-pc-names" class="form-input" placeholder="PC-001, PC-002">
                    <small class="text-muted">空欄で保存後、個別に追加可能</small>
                </div>
                <div class="task-form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-group-modal">キャンセル</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Group Task Modal -->
<div id="group-task-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="group-task-modal-title">一括タスク実行</h3>
            <button class="modal-close" id="btn-close-group-task-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="group-task-form">
                <input type="hidden" id="group-task-group-id">
                <div class="form-group">
                    <label class="form-label">タスク種別 <span class="required">*</span></label>
                    <select id="group-task-type" class="form-input">
                        <option value="cleanup">クリーンアップ</option>
                        <option value="update">更新実行</option>
                        <option value="diagnose">診断実行</option>
                        <option value="collect">情報収集</option>
                        <option value="custom">カスタム</option>
                    </select>
                </div>
                <div class="form-group hidden" id="group-command-group">
                    <label class="form-label">コマンド</label>
                    <input type="text" id="group-task-command" class="form-input" placeholder="PowerShell コマンド">
                </div>
                <div class="task-form-actions">
                    <button type="submit" class="btn btn-primary">一括実行</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-group-task-modal">キャンセル</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- PC Members Modal -->
<div id="members-modal" class="modal-overlay">
    <div class="modal-container modal-md">
        <div class="modal-header">
            <h3 class="modal-title" id="members-modal-title">所属 PC</h3>
            <button class="modal-close" id="btn-close-members-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <div class="form-group d-flex-gap-sm">
                <input type="text" id="add-pc-name" class="form-input" placeholder="PC名を入力して追加">
                <button type="button" class="btn btn-primary" id="btn-add-pc-to-group">追加</button>
            </div>
            <table class="table">
                <thead>
                    <tr><th>PC名</th><th>状態</th><th>操作</th></tr>
                </thead>
                <tbody id="members-body"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/groups.js"></script>
{% endblock %}
