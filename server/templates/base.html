<!DOCTYPE html>
<html lang="ja">
<head>

<body>

                <a href="/certs" class="nav-item" data-page="certs" id="nav-certs" style="display:none;">

                    <span class="nav-label">証明書管理</span>
                </a>
                <a href="/backups" class="nav-item" data-page="backups" id="nav-backups" style="display:none;">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg></span>

                    <span class="nav-label">通知設定</span>
                </a>
                <a href="/licenses" class="nav-item" data-page="licenses" id="nav-licenses" style="display:none;">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="12" cy="15" r="2"/><path d="M12 12v1"/><path d="M12 17v1"/></svg></span>
                    <span class="nav-label">ライセンス管理</span>
                </a>

            <div class="sidebar-footer">
                <div class="avatar" id="user-avatar">--</div>
                <div class="user-meta">
                    <div class="user-name">
                        <span id="user-info">---</span>
                        <span class="role-pill admin" id="role-pill" style="display:none;"></span>
                    </div>
                    <div class="user-role" id="user-role-text"></div>
                </div>
                <button class="icon-btn" id="logout-btn" title="ログアウト">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>
        <div class="main">
            <header class="topbar" role="banner">
                <div class="search">
                    <span class="search-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    </span>
                    <input id="topbar-search" type="search" placeholder="PC名・IP・タスクID・ユーザーで検索..." aria-label="検索" autocomplete="off">
                    <span class="kbd" aria-hidden="true">⌘K / Ctrl+K</span>
                </div>
                <div class="topbar-actions">
                    <span class="env-pill" id="env-pill" title="API ステータス">
                        <span class="dot" aria-hidden="true"></span>
                        <span id="env-pill-label">API healthy</span>
                    </span>
                    <button class="btn btn-secondary btn-sm" id="topbar-sync-btn" type="button" title="同期">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
                        <span>同期</span>
                    </button>
                    <a class="btn btn-primary btn-sm" id="topbar-create-task" href="/tasks" title="タスク発行">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        <span>タスク発行</span>
                    </a>
                    <span class="topbar-divider" aria-hidden="true"></span>
                    <a class="icon-btn" href="/alerts" id="topbar-bell" title="通知" aria-label="通知">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span id="topbar-bell-badge" class="topbar-bell-badge" style="display:none;">0</span>
                    </a>
                    <a class="icon-btn" href="/settings" id="topbar-cog" title="設定" aria-label="設定">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </a>

            </header>
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const API_BASE = '/api';
        let TOKEN = localStorage.getItem('token');

        function apiUrl(path) {
            return API_BASE + path;
        }

        async function apiFetch(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            const res = await fetch(apiUrl(path), {
                ...options,
                headers,
            });
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
                throw new Error('Unauthorized');
            }
            return res.json();
        }

        async function updateAlertsBadge() {
            try {
                const data = await apiFetch('/alerts?per_page=1');
                const count = data.unresolved_count || 0;
                const badge = document.getElementById('alerts-badge');
                if (badge) {
                    badge.textContent = count;
                    badge.style.display = count > 0 ? 'inline-block' : 'none';
                }
                const topbarBadge = document.getElementById('topbar-bell-badge');
                if (topbarBadge) {
                    topbarBadge.textContent = count > 99 ? '99+' : count;
                    topbarBadge.style.display = count > 0 ? 'inline-block' : 'none';
                }
            } catch (e) {}
        }

        async function updateEnvPill() {
            const pill = document.getElementById('env-pill');
            const label = document.getElementById('env-pill-label');
            if (!pill || !label) return;
            try {
                const res = await fetch('/health', { cache: 'no-store' });
                if (res.ok) {
                    pill.classList.remove('env-pill-error');
                    pill.classList.add('env-pill-ok');
                    label.textContent = 'API healthy';
                } else {
                    pill.classList.remove('env-pill-ok');
                    pill.classList.add('env-pill-error');
                    label.textContent = 'API degraded';
                }
            } catch (e) {
                pill.classList.remove('env-pill-ok');
                pill.classList.add('env-pill-error');
                label.textContent = 'API down';
            }
        }

        async function updateSidebarCounts() {
            const setBadge = (id, count) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (count > 0) {
                    el.textContent = count > 99 ? '99+' : count;
                    el.style.display = 'inline-block';
                } else {
                    el.style.display = 'none';
                }
            };
            const fetchCount = async (path, key) => {
                try {
                    const data = await apiFetch(path);
                    if (typeof data[key] === 'number') return data[key];
                    if (Array.isArray(data.items)) return data.items.length;
                    if (Array.isArray(data)) return data.length;
                    return 0;
                } catch (e) { return 0; }
            };
            const [pcs, tasks] = await Promise.all([
                fetchCount('/pcs?per_page=1', 'total'),
                fetchCount('/tasks?status=running&per_page=1', 'total'),
            ]);
            setBadge('pcs-badge', pcs);
            setBadge('tasks-badge', tasks);
            // /api/agents is not implemented yet; agents-badge stays hidden until that endpoint lands.
        }

        async function apiFetchRaw(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            return fetch(apiUrl(path), { ...options, headers });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showError(message) {
            showToast(message, 'error');
        }

        function showSuccess(message) {
            showToast(message, 'success');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!TOKEN && window.location.pathname !== '/login') {
                window.location.href = '/login';
                return;
            }

            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                });
            }

            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const info = document.getElementById('user-info');
                if (info) {
                    info.textContent = user.username || '---';
                }
                // Update avatar initials
                const avatarEl = document.getElementById('user-avatar');
                if (avatarEl && user.username) {
                    avatarEl.textContent = user.username.slice(0, 2).toUpperCase();
                }
                // Update role pill
                const rolePill = document.getElementById('role-pill');
                const roleText = document.getElementById('user-role-text');
                const roleLabels = { admin: '管理者', operator: 'オペレーター', viewer: '閲覧者' };
                if (rolePill && user.role) {
                    rolePill.textContent = user.role;
                    rolePill.className = 'role-pill ' + user.role;
                    rolePill.style.display = '';
                }
                if (roleText && user.role) {
                    roleText.textContent = roleLabels[user.role] || user.role;
                }
                window.CURRENT_USER_ROLE = user.role || null;
                const navUsers = document.getElementById('nav-users');
                if (navUsers && user.role === 'admin') navUsers.style.display = '';
                const navAudit = document.getElementById('nav-audit');
                if (navAudit && (user.role === 'admin' || user.role === 'operator')) {
                    navAudit.style.display = '';
                }
                // ADMIN-only sections (settings/certs/backups/notif-cfg/licenses)
                if (user.role === 'admin') {
                    ['nav-settings', 'nav-certs', 'nav-backups', 'nav-notif-cfg', 'nav-licenses'].forEach((id) => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = '';
                    });
                }
                // Hide write-only actions for viewers (best-effort UX; API enforces auth)
                if (user.role === 'viewer') {
                    document.body.classList.add('role-viewer');
                }
                if (user.role === 'operator') {
                    document.body.classList.add('role-operator');
                }
                if (user.role === 'admin') {
                    document.body.classList.add('role-admin');
                }
            } catch (e) {}

            if (TOKEN) {
                updateAlertsBadge();
                setInterval(updateAlertsBadge, 30000);
                updateSidebarCounts();
                setInterval(updateSidebarCounts, 45000);
            }

            // Topbar: env-pill (API health), search ⌘K shortcut, sync button
            updateEnvPill();
            setInterval(updateEnvPill, 60000);

            const topbarSearch = document.getElementById('topbar-search');
            if (topbarSearch) {
                document.addEventListener('keydown', (e) => {
                    const isMac = navigator.platform.toLowerCase().includes('mac');
                    const meta = isMac ? e.metaKey : e.ctrlKey;
                    if (meta && (e.key === 'k' || e.key === 'K')) {
                        e.preventDefault();
                        topbarSearch.focus();
                        topbarSearch.select();
                    }
                });
            }

            const syncBtn = document.getElementById('topbar-sync-btn');
            if (syncBtn) {
                syncBtn.addEventListener('click', async () => {
                    syncBtn.classList.add('is-syncing');
                    try {
                        const jobs = [updateEnvPill()];
                        if (TOKEN) {
                            jobs.push(updateAlertsBadge(), updateSidebarCounts());
                        }
                        await Promise.all(jobs);
                        showToast('同期しました', 'success');
                    } catch (err) {
                        showToast('同期に失敗しました', 'error');
                    } finally {
                        syncBtn.classList.remove('is-syncing');
                    }
                });
            }

            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                const page = item.dataset.page;
                if (page && ((currentPath === '/' && page === 'dashboard') ||
                    currentPath.startsWith('/' + page) ||
                    (currentPath.includes('/pcs') && page === 'pcs'))) {
                    item.classList.add('active');
                }
            });

            // Sidebar accordion: section toggle + state persistence
            const NAV_STATE_KEY = 'navSectionsCollapsed';
            let savedNavState = {};
            try {
                savedNavState = JSON.parse(localStorage.getItem(NAV_STATE_KEY) || '{}');
            } catch (e) {
                savedNavState = {};
            }
            const activeSection = document.querySelector('.nav-section .nav-item.active')?.closest('.nav-section');
            document.querySelectorAll('.nav-section').forEach(section => {
                const sectionId = section.dataset.section;
                if (!sectionId) return;
                const btn = section.querySelector('.nav-section-toggle');
                const shouldCollapse = savedNavState[sectionId] === true && section !== activeSection;
                if (shouldCollapse) {
                    section.classList.add('collapsed');
                    if (btn) btn.setAttribute('aria-expanded', 'false');
                } else {
                    section.classList.remove('collapsed');
                    if (btn) btn.setAttribute('aria-expanded', 'true');
                }
                if (btn) {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const collapsed = section.classList.toggle('collapsed');
                        btn.setAttribute('aria-expanded', String(!collapsed));
                        try {
                            const state = JSON.parse(localStorage.getItem(NAV_STATE_KEY) || '{}');
                            state[sectionId] = collapsed;
                            localStorage.setItem(NAV_STATE_KEY, JSON.stringify(state));
                        } catch (err) {}
                    });
                }
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
