<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC-Ops Orchestrator - {% block title %}Dashboard{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">
                    <svg viewBox="0 0 18 18" fill="currentColor"><rect x="2" y="2" width="6" height="6" rx="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5"/></svg>
                </div>
                <div class="brand-text">
                    <span class="brand-name">PC-Ops</span>
                    <span class="brand-sub">Orchestrator</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">OPERATIONS</div>
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="/pcs" class="nav-item" data-page="pcs">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg></span>
                    <span class="nav-label">PC一覧</span>
                </a>
                <a href="/tasks" class="nav-item" data-page="tasks">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
                    <span class="nav-label">タスク管理</span>
                </a>
                <a href="/alerts" class="nav-item" data-page="alerts">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                    <span class="nav-label">アラート</span>
                    <span id="alerts-badge" class="nav-badge" style="display:none;">0</span>
                </a>

                <div class="nav-section-label">AUTOMATION</div>
                <a href="/scheduled-tasks" class="nav-item" data-page="scheduled-tasks">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
                    <span class="nav-label">スケジュール</span>
                </a>
                <a href="/groups" class="nav-item" data-page="groups">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                    <span class="nav-label">PCグループ</span>
                </a>
                <a href="/alert-rules" class="nav-item" data-page="alert-rules">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07"/><path d="M20.45 20.45A10 10 0 0 0 20.45 3.55"/></svg></span>
                    <span class="nav-label">アラートルール</span>
                </a>

                <div class="nav-section-label">ADMIN</div>
                <a href="/users" class="nav-item" data-page="users" id="nav-users" style="display:none;">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    <span class="nav-label">ユーザー管理</span>
                </a>
                <a href="/audit" class="nav-item" data-page="audit" id="nav-audit" style="display:none;">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
                    <span class="nav-label">操作ログ</span>
                </a>
                {% if swagger_enabled %}
                <a href="/api/docs/" class="nav-item" data-page="api-docs" id="nav-api-docs" target="_blank" rel="noopener">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
                    <span class="nav-label">API ドキュメント</span>
                </a>
                {% endif %}
            </nav>
            <div class="sidebar-footer">
                <div class="avatar" id="user-avatar">--</div>
                <div class="user-meta">
                    <div class="user-name">
                        <span id="user-info">---</span>
                        <span class="role-pill admin" id="role-pill" style="display:none;"></span>
                    </div>
                    <div class="user-role" id="user-role-text"></div>
                </div>
                <button class="icon-btn" id="logout-btn" title="ログアウト">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="toast-container"></div>

    <script>
        const API_BASE = '/api';
        let TOKEN = localStorage.getItem('token');

        function apiUrl(path) {
            return API_BASE + path;
        }

        async function apiFetch(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            const res = await fetch(apiUrl(path), {
                ...options,
                headers,
            });
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
                throw new Error('Unauthorized');
            }
            return res.json();
        }

        async function updateAlertsBadge() {
            try {
                const data = await apiFetch('/alerts?per_page=1');
                const badge = document.getElementById('alerts-badge');
                if (!badge) return;
                const count = data.unresolved_count || 0;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline-block' : 'none';
            } catch (e) {}
        }

        async function apiFetchRaw(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            return fetch(apiUrl(path), { ...options, headers });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showError(message) {
            showToast(message, 'error');
        }

        function showSuccess(message) {
            showToast(message, 'success');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!TOKEN && window.location.pathname !== '/login') {
                window.location.href = '/login';
                return;
            }

            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                });
            }

            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const info = document.getElementById('user-info');
                if (info) {
                    info.textContent = user.username || '---';
                }
                // Update avatar initials
                const avatarEl = document.getElementById('user-avatar');
                if (avatarEl && user.username) {
                    avatarEl.textContent = user.username.slice(0, 2).toUpperCase();
                }
                // Update role pill
                const rolePill = document.getElementById('role-pill');
                const roleText = document.getElementById('user-role-text');
                const roleLabels = { admin: '管理者', operator: 'オペレーター', viewer: '閲覧者' };
                if (rolePill && user.role) {
                    rolePill.textContent = user.role;
                    rolePill.className = 'role-pill ' + user.role;
                    rolePill.style.display = '';
                }
                if (roleText && user.role) {
                    roleText.textContent = roleLabels[user.role] || user.role;
                }
                window.CURRENT_USER_ROLE = user.role || null;
                const navUsers = document.getElementById('nav-users');
                if (navUsers && user.role === 'admin') navUsers.style.display = '';
                const navAudit = document.getElementById('nav-audit');
                if (navAudit && (user.role === 'admin' || user.role === 'operator')) {
                    navAudit.style.display = '';
                }
                // Hide write-only actions for viewers (best-effort UX; API enforces auth)
                if (user.role === 'viewer') {
                    document.body.classList.add('role-viewer');
                }
                if (user.role === 'operator') {
                    document.body.classList.add('role-operator');
                }
                if (user.role === 'admin') {
                    document.body.classList.add('role-admin');
                }
            } catch (e) {}

            if (TOKEN) {
                updateAlertsBadge();
                setInterval(updateAlertsBadge, 30000);
            }

            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                const page = item.dataset.page;
                if (page && ((currentPath === '/' && page === 'dashboard') ||
                    currentPath.startsWith('/' + page) ||
                    (currentPath.includes('/pcs') && page === 'pcs'))) {
                    item.classList.add('active');
                }
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
