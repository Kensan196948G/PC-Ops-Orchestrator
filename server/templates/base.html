<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC-Ops Orchestrator - {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">PC-Ops</h1>
                <span class="sidebar-subtitle">Orchestrator</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">&#9632;</span>
                    Dashboard
                </a>
                <a href="/pcs" class="nav-item" data-page="pcs">
                    <span class="nav-icon">&#9644;</span>
                    PC一覧
                </a>
                <a href="/tasks" class="nav-item" data-page="tasks">
                    <span class="nav-icon">&#9679;</span>
                    タスク管理
                </a>
                <a href="/alerts" class="nav-item" data-page="alerts">
                    <span class="nav-icon">&#9888;</span>
                    アラート
                    <span id="alerts-badge" class="nav-badge" style="display:none;">0</span>
                </a>
                <a href="/scheduled-tasks" class="nav-item" data-page="scheduled-tasks">
                    <span class="nav-icon">&#9201;</span>
                    スケジュール
                </a>
                <a href="/groups" class="nav-item" data-page="groups">
                    <span class="nav-icon">&#9671;</span>
                    PCグループ
                </a>
                <a href="/users" class="nav-item" data-page="users" id="nav-users" style="display:none;">
                    <span class="nav-icon">&#9786;</span>
                    ユーザー管理
                </a>
                <a href="/audit" class="nav-item" data-page="audit" id="nav-audit" style="display:none;">
                    <span class="nav-icon">&#9998;</span>
                    操作ログ
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" id="logout-btn">
                    <span class="nav-icon">&#9660;</span>
                    ログアウト
                </a>
            </nav>
            <div class="sidebar-footer">
                <span id="user-info">---</span>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="toast-container"></div>

    <script>
        const API_BASE = '/api';
        let TOKEN = localStorage.getItem('token');

        function apiUrl(path) {
            return API_BASE + path;
        }

        async function apiFetch(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            const res = await fetch(apiUrl(path), {
                ...options,
                headers,
            });
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
                throw new Error('Unauthorized');
            }
            return res.json();
        }

        async function updateAlertsBadge() {
            try {
                const data = await apiFetch('/alerts?per_page=1');
                const badge = document.getElementById('alerts-badge');
                if (!badge) return;
                const count = data.unresolved_count || 0;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline-block' : 'none';
            } catch (e) {}
        }

        async function apiFetchRaw(path, options = {}) {
            const headers = options.headers || {};
            if (TOKEN) {
                headers['Authorization'] = 'Bearer ' + TOKEN;
            }
            if (options.body && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            return fetch(apiUrl(path), { ...options, headers });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showError(message) {
            showToast(message, 'error');
        }

        function showSuccess(message) {
            showToast(message, 'success');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!TOKEN && window.location.pathname !== '/login') {
                window.location.href = '/login';
                return;
            }

            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                });
            }

            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const info = document.getElementById('user-info');
                if (info) info.textContent = user.username || '---';
                const navUsers = document.getElementById('nav-users');
                if (navUsers && user.role === 'admin') navUsers.style.display = '';
                const navAudit = document.getElementById('nav-audit');
                if (navAudit && user.role === 'admin') navAudit.style.display = '';
            } catch (e) {}

            if (TOKEN) {
                updateAlertsBadge();
                setInterval(updateAlertsBadge, 30000);
            }

            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                const page = item.dataset.page;
                if (page && ((currentPath === '/' && page === 'dashboard') ||
                    currentPath.startsWith('/' + page) ||
                    (currentPath.includes('/pcs') && page === 'pcs'))) {
                    item.classList.add('active');
                }
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
