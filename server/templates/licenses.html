{% extends "base.html" %}
{% block title %}ライセンス管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">ライセンス管理</h2>
    <p class="page-description">インストール済みソフトウェアのライセンス数追跡と期限アラートを管理します。</p>
</div>

<div class="card">
    <div class="empty-state">
        <h3>準備中</h3>
        <p>このページは将来のマイルストーンで実装予定です。</p>
        <ul>
            <li>ライセンス一覧 (種別 / 数量 / 期限)</li>
            <li>コンプライアンス確認</li>
            <li>ソフトウェアインベントリ</li>
            <li>コスト分析</li>
            <li>期限アラート (30 / 60 / 90 日前)</li>
        </ul>
    </div>
</div>
{% endblock %}
