{% extends "base.html" %}
{% block title %}ライセンス管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">ライセンス管理</h2>
    <p class="page-description">ソフトウェアライセンスの一元管理と費用集計。</p>
    <div class="d-flex-gap">
        <button class="btn btn-primary role-admin-only" id="btn-add-license">+ ライセンス登録</button>
    </div>
</div>

<div class="card">
    <h3 class="card-title">📋 ライセンス一覧</h3>
    <table class="table">
        <thead>
            <tr>
                <th>製品名</th>
                <th>ベンダー</th>
                <th>種別</th>
                <th>席数</th>
                <th>単価</th>
                <th>合計コスト</th>
                <th>有効期限</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="licenses-body">
            <tr><td colspan="8" class="text-center">読み込み中...</td></tr>
        </tbody>
        <tfoot>
            <tr class="fw-bold">
                <td colspan="5">合計</td>
                <td id="licenses-total">—</td>
                <td colspan="2"></td>
            </tr>
        </tfoot>
    </table>
</div>

<!-- License Modal -->
<div id="license-modal" class="modal-overlay">
    <div class="modal-container modal-560">
        <div class="modal-header">
            <h3 class="modal-title" id="license-modal-title">ライセンス登録</h3>
            <button class="modal-close" id="btn-close-license-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="license-form">
                <div class="form-group">
                    <label class="form-label">製品名 <span class="required">*</span></label>
                    <input type="text" id="license-product" class="form-input" placeholder="例: Microsoft 365 Business" required>
                </div>
                <div class="form-group">
                    <label class="form-label">ベンダー</label>
                    <input type="text" id="license-vendor" class="form-input" placeholder="例: Microsoft">
                </div>
                <div class="form-group">
                    <label class="form-label">種別</label>
                    <select id="license-type" class="form-input">
                        <option value="subscription">サブスクリプション</option>
                        <option value="perpetual">永続ライセンス</option>
                        <option value="volume">ボリュームライセンス</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">席数</label>
                    <input type="number" id="license-seats" class="form-input" min="1" placeholder="例: 50">
                </div>
                <div class="form-group">
                    <label class="form-label">単価（円/席/月）</label>
                    <input type="number" id="license-price" class="form-input" min="0" placeholder="例: 1360">
                </div>
                <div class="form-group">
                    <label class="form-label">有効期限（永続の場合は空欄）</label>
                    <input type="date" id="license-expires" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">メモ</label>
                    <textarea id="license-notes" class="form-input" rows="2" placeholder="備考など"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-close-license-modal-foot">キャンセル</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}" src="/static/js/licenses.js"></script>
{% endblock %}
