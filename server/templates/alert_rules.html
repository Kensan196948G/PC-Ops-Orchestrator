{% extends "base.html" %}
{% block title %}アラートルール設定{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">アラートルール設定</h2>
    <button class="btn btn-primary role-admin-only" id="btn-show-create-rule">+ 新規ルール</button>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>ルール名</th>
                <th>メトリクス</th>
                <th>条件</th>
                <th>重大度</th>
                <th>通知先</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="rules-body">
            <tr><td colspan="7" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="rules-pagination"></div>
</div>

<!-- Create/Edit Modal -->
<div id="rule-modal" class="modal-overlay">
    <div class="modal-container modal-560">
        <div class="modal-header">
            <h3 class="modal-title" id="rule-modal-title">ルールの作成</h3>
            <button class="modal-close" id="btn-close-rule-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="rule-form">
                <input type="hidden" id="rule-id">
                <div class="form-group">
                    <label class="form-label">ルール名 <span class="required">*</span></label>
                    <input type="text" id="rule-name" class="form-input" required placeholder="例: CPU高負荷アラート">
                </div>
                <div class="form-group">
                    <label class="form-label">メトリクス <span class="required">*</span></label>
                    <select id="rule-metric" class="form-input">
                        <option value="cpu">CPU 使用率 (%)</option>
                        <option value="memory">メモリ使用率 (%)</option>
                        <option value="disk">ディスク使用率 (%)</option>
                        <option value="offline">PC オフライン</option>
                    </select>
                </div>
                <div id="threshold-group">
                    <div class="form-group">
                        <label class="form-label">演算子</label>
                        <select id="rule-operator" class="form-input">
                            <option value="gt">より大きい (&gt;)</option>
                            <option value="gte">以上 (&gt;=)</option>
                            <option value="lt">より小さい (&lt;)</option>
                            <option value="lte">以下 (&lt;=)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">しきい値 (%) <span class="required">*</span></label>
                        <input type="number" id="rule-threshold" class="form-input" min="0" max="100" step="0.1" placeholder="例: 90">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">重大度</label>
                    <select id="rule-severity" class="form-input">
                        <option value="warning">warning</option>
                        <option value="critical">critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">通知チャネル (任意)</label>
                    <select id="rule-channel-type" class="form-input">
                        <option value="">自動（設定された通知先すべて）</option>
                        <option value="slack">Slack のみ</option>
                        <option value="teams">Microsoft Teams のみ</option>
                        <option value="email">Email のみ</option>
                        <option value="generic_webhook">Generic Webhook のみ</option>
                    </select>
                </div>
                <div class="form-group" data-channel="slack">
                    <label class="form-label">Slack Webhook URL</label>
                    <input type="url" id="rule-slack" class="form-input" placeholder="https://hooks.slack.com/...">
                </div>
                <div class="form-group" data-channel="teams">
                    <label class="form-label">Microsoft Teams Webhook URL</label>
                    <input type="url" id="rule-teams" class="form-input" placeholder="https://outlook.office.com/webhook/...">
                </div>
                <div class="form-group" data-channel="generic">
                    <label class="form-label">Generic Webhook URL (JSON POST)</label>
                    <input type="url" id="rule-generic" class="form-input" placeholder="https://example.com/hooks/alerts">
                </div>
                <div class="form-group" data-channel="email">
                    <label class="form-label">通知メールアドレス</label>
                    <input type="email" id="rule-email" class="form-input" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="rule-enabled" checked> 有効
                    </label>
                </div>
                <div class="task-form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-rule-modal">キャンセル</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/alert_rules.js"></script>
{% endblock %}
