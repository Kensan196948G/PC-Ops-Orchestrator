{% extends "base.html" %}
{% block title %}レポート・分析{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">レポート・分析</h2>
    <p class="page-description">健全性トレンド・タスク分析・アラート分析・月次レポートの可視化。</p>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
        <label style="font-size:0.9rem;">対象月:
            <input type="month" id="reportMonth" class="form-control" style="display:inline-block;width:auto;margin-left:0.4rem;">
        </label>
        <button class="btn btn-secondary" type="button" id="btnCsvExport">📊 CSV エクスポート</button>
        <button class="btn btn-primary" type="button" id="btnPdfExport">📄 月次 PDF レポート</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card stat-healthy">
        <div class="stat-value" id="statHealth">—</div>
        <div class="stat-label">健全率（当月）</div>
    </div>
    <div class="stat-card stat-task">
        <div class="stat-value" id="statTaskRate">—</div>
        <div class="stat-label">タスク成功率</div>
    </div>
    <div class="stat-card stat-warning">
        <div class="stat-value" id="statAlerts">—</div>
        <div class="stat-label">当月アラート数</div>
    </div>
    <div class="stat-card stat-online">
        <div class="stat-value" id="statSLA">—</div>
        <div class="stat-label">SLA</div>
    </div>
</div>

<div class="charts-grid">
    <div class="card">
        <h3 class="card-title">PC 稼働状況</h3>
        <div class="chart-container">
            <canvas id="reportPcChart"></canvas>
        </div>
    </div>
    <div class="card">
        <h3 class="card-title">タスク実行状況</h3>
        <div class="chart-container">
            <canvas id="reportTaskChart"></canvas>
        </div>
    </div>
</div>

<div class="card">
    <h3 class="card-title">アラート傾向（重大度別）</h3>
    <table class="table">
        <thead>
            <tr><th>重大度</th><th>件数</th></tr>
        </thead>
        <tbody id="alertTableBody"></tbody>
    </table>
</div>

<div class="card">
    <h3 class="card-title">月次レポート アーカイブ</h3>
    <table class="table">
        <thead>
            <tr>
                <th>対象月</th>
                <th>PC 数</th>
                <th>タスク件数</th>
                <th>アラート件数</th>
                <th>SLA</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="archiveTableBody"></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}">
    let pcChart = null, taskChart = null;

    function formatMonth(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        return y + '-' + m;
    }

    function getSelectedYearMonth() {
        const val = document.getElementById('reportMonth').value;
        if (!val) return null;
        const parts = val.split('-');
        return { year: Number(parts[0]), month: Number(parts[1]) };
    }

    async function loadMonthlyData() {
        const ym = getSelectedYearMonth();
        if (!ym) return;
        try {
            const data = await apiFetch('/reports/monthly?year=' + ym.year + '&month=' + ym.month);
            renderStats(data);
            renderCharts(data);
            renderAlertTable(data);
        } catch (e) {
            console.error('loadMonthlyData failed', e);
        }
    }

    function setText(id, val) {
        document.getElementById(id).textContent = val;
    }

    function renderStats(data) {
        setText('statHealth', data.pc.health_rate + '%');
        setText('statTaskRate', data.tasks.success_rate + '%');
        setText('statAlerts', String(data.alerts.total));
        setText('statSLA', data.sla + '%');
    }

    function renderCharts(data) {
        const style = getComputedStyle(document.documentElement);
        const accent = style.getPropertyValue('--accent').trim() || '#2563eb';
        const success = style.getPropertyValue('--success').trim() || '#16a34a';
        const danger = style.getPropertyValue('--danger').trim() || '#dc2626';

        const pcEl = document.getElementById('reportPcChart');
        if (pcEl && window.Chart) {
            if (pcChart) { pcChart.destroy(); pcChart = null; }
            pcChart = new Chart(pcEl, {
                type: 'doughnut',
                data: {
                    labels: ['オンライン', 'オフライン'],
                    datasets: [{ data: [data.pc.online, data.pc.offline], backgroundColor: [success, '#e5e7eb'] }],
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
            });
        }

        const taskEl = document.getElementById('reportTaskChart');
        if (taskEl && window.Chart) {
            if (taskChart) { taskChart.destroy(); taskChart = null; }
            taskChart = new Chart(taskEl, {
                type: 'bar',
                data: {
                    labels: ['完了', '失敗', '保留中'],
                    datasets: [{ label: 'タスク数', data: [data.tasks.completed, data.tasks.failed, data.tasks.pending], backgroundColor: [success, danger, '#f59e0b'] }],
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } },
            });
        }
    }

    function makeBadge(cls, text) {
        const span = document.createElement('span');
        span.className = 'badge badge-' + cls;
        span.textContent = text;
        return span;
    }

    function renderAlertTable(data) {
        const tbody = document.getElementById('alertTableBody');
        tbody.replaceChildren();
        const rows = [
            ['danger', 'Critical', data.alerts.critical],
            ['warning', 'High', data.alerts.high],
            ['info', 'Medium', data.alerts.medium],
            ['secondary', 'Low', data.alerts.low],
        ];
        rows.forEach(([cls, label, count]) => {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.appendChild(makeBadge(cls, label));
            const td2 = document.createElement('td');
            td2.textContent = String(count);
            tr.appendChild(td1);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        });
        const trTotal = document.createElement('tr');
        trTotal.style.fontWeight = '600';
        const tdLabel = document.createElement('td');
        tdLabel.textContent = '合計';
        const tdCount = document.createElement('td');
        tdCount.textContent = String(data.alerts.total);
        trTotal.appendChild(tdLabel);
        trTotal.appendChild(tdCount);
        tbody.appendChild(trTotal);
    }

    async function downloadWithAuth(path, filename) {
        try {
            const res = await apiFetchRaw(path);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (typeof showToast === 'function') showToast(err.error || 'ダウンロードに失敗しました', 'error');
                return;
            }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        } catch (e) {
            console.error('download failed', e);
            if (typeof showToast === 'function') showToast('ダウンロードに失敗しました', 'error');
        }
    }

    function makeDownloadBtn(label, path, filename) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary';
        btn.style.fontSize = '0.8rem';
        btn.textContent = label;
        btn.addEventListener('click', () => downloadWithAuth(path, filename));
        return btn;
    }

    async function loadArchive() {
        try {
            const data = await apiFetch('/reports/monthly/list?months=12');
            const tbody = document.getElementById('archiveTableBody');
            tbody.replaceChildren();
            if (!data.reports || data.reports.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 6;
                td.style.textAlign = 'center';
                td.style.color = 'var(--text-secondary)';
                td.textContent = 'データなし';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }
            data.reports.forEach(r => {
                const parts = r.period.split('-');
                const year = Number(parts[0]);
                const month = Number(parts[1]);
                const tr = document.createElement('tr');
                const cells = [r.period, r.pc.total, r.tasks.total, r.alerts.total, r.sla + '%'];
                cells.forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = String(val);
                    tr.appendChild(td);
                });
                const tdOps = document.createElement('td');
                const csvPath = '/reports/monthly/export.csv?year=' + year + '&month=' + month;
                const pdfPath = '/reports/monthly/export.pdf?year=' + year + '&month=' + month;
                const csvBtn = makeDownloadBtn('CSV', csvPath, `report-${r.period}.csv`);
                const pdfBtn = makeDownloadBtn('PDF', pdfPath, `report-${r.period}.pdf`);
                tdOps.appendChild(csvBtn);
                tdOps.appendChild(document.createTextNode(' '));
                tdOps.appendChild(pdfBtn);
                tr.appendChild(tdOps);
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error('loadArchive failed', e);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        const input = document.getElementById('reportMonth');
        input.value = formatMonth(now);
        input.addEventListener('change', loadMonthlyData);

        document.getElementById('btnCsvExport').addEventListener('click', () => {
            const ym = getSelectedYearMonth();
            if (ym) downloadWithAuth(
                '/reports/monthly/export.csv?year=' + ym.year + '&month=' + ym.month,
                `report-${ym.year}-${String(ym.month).padStart(2,'0')}.csv`
            );
        });
        document.getElementById('btnPdfExport').addEventListener('click', () => {
            const ym = getSelectedYearMonth();
            if (ym) downloadWithAuth(
                '/reports/monthly/export.pdf?year=' + ym.year + '&month=' + ym.month,
                `report-${ym.year}-${String(ym.month).padStart(2,'0')}.pdf`
            );
        });

        loadMonthlyData();
        loadArchive();
    });
</script>
{% endblock %}
