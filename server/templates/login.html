<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC-Ops Orchestrator - Login</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <svg viewBox="0 0 18 18" fill="currentColor"><rect x="2" y="2" width="6" height="6" rx="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5"/></svg>
            </div>
            <h1 class="login-title">PC-Ops Orchestrator</h1>
            <p class="login-subtitle">PC運用管理システム</p>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" class="form-input" placeholder="admin" autocomplete="current-password" required>
                </div>
                <div id="login-error" class="login-error"></div>
                <button type="submit" class="btn btn-primary login-btn">ログイン</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const btn = e.target.querySelector('button');

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = 'ログイン中...';

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || 'ログインに失敗しました';
                    btn.disabled = false;
                    btn.textContent = 'ログイン';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = 'サーバーに接続できません';
                btn.disabled = false;
                btn.textContent = 'ログイン';
            }
        });
    </script>
</body>
</html>
