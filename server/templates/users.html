{% extends "base.html" %}
{% block title %}ユーザー管理{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">ユーザー管理</h2>
    <div class="page-actions">
        <button class="btn btn-primary role-admin-only" onclick="openCreateModal()">+ ユーザー追加</button>
    </div>
</div>

<div class="card">
    <table class="table" id="user-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>ユーザー名</th>
                <th>ロール</th>
                <th>状態</th>
                <th>作成日時</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="user-table-body">
            <tr><td colspan="6" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<div id="create-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" onclick="closeCreateModal()"></div>
    <div class="modal-box">
        <h3>ユーザー追加</h3>
        <form id="create-form" onsubmit="submitCreate(); return false;" autocomplete="off">
        <div class="form-group">
            <label>ユーザー名</label>
            <input type="text" id="new-username" class="form-input" placeholder="username" autocomplete="username">
        </div>
        <div class="form-group">
            <label>パスワード（8文字以上）</label>
            <input type="password" id="new-password" class="form-input" placeholder="password" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>ロール</label>
            <select id="new-role" class="form-input">
                <option value="operator">operator</option>
                <option value="admin">admin</option>
            </select>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">キャンセル</button>
            <button type="submit" class="btn btn-primary">作成</button>
        </div>
        </form>
    </div>
</div>

<div id="edit-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" onclick="closeEditModal()"></div>
    <div class="modal-box">
        <h3>ユーザー編集</h3>
        <form id="edit-form" onsubmit="submitEdit(); return false;" autocomplete="off">
        <input type="hidden" id="edit-user-id">
        <input type="text" id="edit-username-hidden" autocomplete="username" style="display:none;" aria-hidden="true">
        <div class="form-group">
            <label>ロール</label>
            <select id="edit-role" class="form-input">
                <option value="operator">operator</option>
                <option value="admin">admin</option>
            </select>
        </div>
        <div class="form-group">
            <label>状態</label>
            <select id="edit-active" class="form-input">
                <option value="true">有効</option>
                <option value="false">無効</option>
            </select>
        </div>
        <div class="form-group">
            <label>新しいパスワード（変更する場合のみ）</label>
            <input type="password" id="edit-password" class="form-input" placeholder="（変更しない場合は空欄）" autocomplete="new-password">
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/users.js"></script>
{% endblock %}
