{% extends "base.html" %}
{% block title %}操作ログ{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">操作ログ（監査ログ）</h2>
    <div class="page-actions" style="flex-wrap:wrap;gap:0.5rem;">
        <input type="text" id="user-filter" class="form-input" placeholder="実行者で絞り込み"
               style="width:140px;">
        <input type="text" id="action-filter" class="form-input" placeholder="操作内容で絞り込み"
               style="width:160px;">
        <input type="date" id="from-date" class="form-input" title="開始日（この日以降）"
               style="width:140px;">
        <span style="align-self:center;color:var(--text-secondary);">〜</span>
        <input type="date" id="to-date" class="form-input" title="終了日（この日以前）"
               style="width:140px;">
        <button class="btn btn-secondary" id="btn-refresh-audit">&#8635; 更新</button>
        <button class="btn btn-secondary role-operator-or-admin" id="btn-export-audit-csv" title="フィルタ条件で CSV 出力">&#8659; CSV</button>
    </div>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>操作内容</th>
                <th>対象</th>
                <th>詳細</th>
                <th>実行者</th>
                <th>IPアドレス</th>
                <th>日時</th>
            </tr>
        </thead>
        <tbody id="audit-body">
            <tr><td colspan="7" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="audit-pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/audit.js"></script>
{% endblock %}
