{% extends "base.html" %}
{% block title %}スケジュールタスク{% endblock %}
{% block content %}
<div class="page-header">
    <h2 class="page-title">スケジュールタスク</h2>
    <button class="btn btn-primary role-operator-or-admin" id="btn-show-create-st">+ 新規スケジュール</button>
</div>

<div class="card">
    <div class="page-actions">
        <select id="enabled-filter" class="form-input">
            <option value="">すべて</option>
            <option value="true">有効のみ</option>
            <option value="false">無効のみ</option>
        </select>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>名前</th>
                <th>タスク種別</th>
                <th>対象PC</th>
                <th>スケジュール</th>
                <th>次回実行</th>
                <th>最終実行</th>
                <th>実行回数</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="scheduled-tasks-body">
            <tr><td colspan="9" class="text-center">読み込み中...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="scheduled-tasks-pagination"></div>
</div>

<!-- Create/Edit Modal -->
<div id="st-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="st-modal-title">スケジュールタスクの作成</h3>
            <button class="modal-close" id="btn-close-st-modal" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
            <form id="st-form">
                <input type="hidden" id="st-id">
                <div class="form-group">
                    <label class="form-label">名前 <span class="required">*</span></label>
                    <input type="text" id="st-name" class="form-input" required placeholder="例: 毎日クリーンアップ">
                </div>
                <div class="form-group">
                    <label class="form-label">説明</label>
                    <input type="text" id="st-description" class="form-input" placeholder="任意のメモ">
                </div>
                <div class="form-group">
                    <label class="form-label">タスク種別 <span class="required">*</span></label>
                    <select id="st-task-type" class="form-input">
                        <option value="cleanup">クリーンアップ</option>
                        <option value="update">更新実行</option>
                        <option value="diagnose">診断実行</option>
                        <option value="collect">情報収集</option>
                        <option value="custom">カスタム</option>
                    </select>
                </div>
                <div class="form-group hidden" id="command-group">
                    <label class="form-label">コマンド</label>
                    <input type="text" id="st-command" class="form-input" placeholder="PowerShell コマンド">
                </div>
                <div class="form-group">
                    <label class="form-label">対象PC（空欄=全PC）</label>
                    <input type="text" id="st-pc-name" class="form-input" placeholder="PC名">
                </div>
                <div class="form-group">
                    <label class="form-label">スケジュール種別 <span class="required">*</span></label>
                    <select id="st-schedule-type" class="form-input">
                        <option value="interval">間隔（N分ごと）</option>
                        <option value="daily">毎日（指定時刻）</option>
                        <option value="weekly">毎週（指定曜日・時刻）</option>
                    </select>
                </div>
                <div class="form-group" id="interval-group">
                    <label class="form-label">間隔（分）<span class="required">*</span></label>
                    <input type="number" id="st-interval" class="form-input" min="1" value="60" placeholder="60">
                </div>
                <div class="form-group hidden" id="daily-group">
                    <label class="form-label">実行時刻（HH:MM）<span class="required">*</span></label>
                    <input type="time" id="st-daily-time" class="form-input" value="02:00">
                </div>
                <div class="form-group hidden" id="weekly-group">
                    <label class="form-label">曜日 <span class="required">*</span></label>
                    <select id="st-weekly-day" class="form-input">
                        <option value="0">月曜日</option>
                        <option value="1">火曜日</option>
                        <option value="2">水曜日</option>
                        <option value="3">木曜日</option>
                        <option value="4">金曜日</option>
                        <option value="5">土曜日</option>
                        <option value="6">日曜日</option>
                    </select>
                    <label class="form-label mt-label">実行時刻（HH:MM）<span class="required">*</span></label>
                    <input type="time" id="st-weekly-time" class="form-input" value="02:00">
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="st-enabled" checked>
                        有効にする
                    </label>
                </div>
                <div class="task-form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-st-modal">キャンセル</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/scheduled_tasks.js"></script>
{% endblock %}
